<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Важный вопрос 💕</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #ffe0ec 0%, #ffd6f0 50%, #e8d5ff 100%);
      font-family: 'Georgia', serif;
      overflow: hidden;
      position: relative;
    }

    /* Floating hearts background */
    .bg-hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .bg-heart {
      position: absolute;
      font-size: 1.5rem;
      animation: floatUp linear infinite;
      opacity: 0.3;
    }

    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0.3; }
      100% { transform: translateY(-10vh) rotate(20deg); opacity: 0; }
    }

    /* Main card */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(14px);
      border-radius: 32px;
      padding: 56px 64px 130px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(255,100,160,0.25);
      max-width: 480px;
      width: 90%;
      border: 1.5px solid rgba(255,180,210,0.5);
    }

    .emoji-top {
      font-size: 3.5rem;
      display: block;
      margin-bottom: 16px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.12); }
    }

    h1 {
      font-size: 2rem;
      color: #c0406a;
      line-height: 1.3;
      margin-bottom: 40px;
      text-shadow: 0 1px 3px rgba(192,64,106,0.15);
    }

    .buttons {
      display: flex;
      gap: 24px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 16px 44px;
      font-size: 1.3rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: inherit;
      font-weight: bold;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    @media (max-width: 480px) {
      .card {
        padding: 36px 28px 110px;
        border-radius: 24px;
        width: 92%;
      }
      .emoji-top { font-size: 2.8rem; }
      h1 { font-size: 1.5rem; margin-bottom: 28px; }
      .btn { padding: 14px 32px; font-size: 1.1rem; }
      .celebration-text { font-size: 1.7rem; }
      .celebration-sub  { font-size: 1rem; }
      .celebration-emoji { font-size: 3.8rem; }
    }

    .btn-yes {
      background: linear-gradient(135deg, #ff6fa8, #ff3d7f);
      color: white;
      box-shadow: 0 6px 24px rgba(255,61,127,0.4);
    }

    .btn-yes:hover {
      transform: scale(1.08);
      box-shadow: 0 10px 32px rgba(255,61,127,0.55);
    }

    .btn-no {
      background: linear-gradient(135deg, #43e97b, #38f9d7);
      color: white;
      box-shadow: 0 6px 24px rgba(56,249,215,0.5);
      position: fixed;
      transition: none;
      animation: noGlow 1.2s ease-in-out infinite alternate;
      z-index: 50;
    }

    @keyframes noGlow {
      from { box-shadow: 0 6px 24px rgba(56,249,215,0.5); transform: scale(1); }
      to   { box-shadow: 0 8px 36px rgba(67,233,123,0.8); transform: scale(1.06); }
    }

    /* ====== CELEBRATION OVERLAY ====== */
    #celebration {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: linear-gradient(135deg, #ffe0ec, #ffd6f0, #e8d5ff);
      animation: fadeIn 0.5s ease;
    }

    #celebration.show { display: flex; }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    .celebration-emoji {
      font-size: 5rem;
      animation: bounce 0.6s ease infinite alternate;
      margin-bottom: 12px;
    }

    @keyframes bounce {
      from { transform: translateY(0); }
      to   { transform: translateY(-18px); }
    }

    .celebration-text {
      font-size: 2.4rem;
      color: #c0406a;
      font-weight: bold;
      text-align: center;
      padding: 0 20px;
      line-height: 1.35;
      text-shadow: 0 2px 8px rgba(192,64,106,0.2);
    }

    .celebration-sub {
      margin-top: 14px;
      font-size: 1.2rem;
      color: #d4608a;
      text-align: center;
    }

    /* Confetti canvas */
    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 99;
    }
  </style>
</head>
<body>

  <!-- Background floating hearts -->
  <div class="bg-hearts" id="bgHearts"></div>

  <!-- Confetti canvas -->
  <canvas id="confetti"></canvas>

  <!-- Main card -->
  <div class="card" id="mainCard">
    <span class="emoji-top">💕</span>
    <h1>Ты самая лучшая?</h1>
    <div class="buttons">
      <button class="btn btn-yes" id="btnYes" onclick="celebrate()">Да 💖</button>
    </div>
  </div>

  <!-- Кнопка "Нет" вне карточки, чтобы backdrop-filter не ломал position:fixed -->
  <button class="btn btn-no" id="btnNo">Нет 🎁</button>

  <!-- Celebration screen -->
  <div id="celebration">
    <div class="celebration-emoji">🥰</div>
    <div class="celebration-text">Я так и знал!<br>Ты лучше всех на свете! 💕</div>
    <div class="celebration-sub">И ни капли сомнений не было ✨</div>
  </div>

<script>
  /* ── Floating background hearts ── */
  const bgHearts = document.getElementById('bgHearts');
  const heartEmojis = ['💕','💗','💓','💞','🌸','✨','💝'];
  for (let i = 0; i < 22; i++) {
    const h = document.createElement('span');
    h.className = 'bg-heart';
    h.textContent = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];
    h.style.left = Math.random() * 100 + 'vw';
    h.style.fontSize = (0.9 + Math.random() * 1.8) + 'rem';
    const dur = 6 + Math.random() * 10;
    const delay = -Math.random() * dur;
    h.style.animation = `floatUp ${dur}s ${delay}s linear infinite`;
    bgHearts.appendChild(h);
  }

  /* ── Runaway "Нет" button ── */
  const btnNo = document.getElementById('btnNo');
  let noX = 0, noY = 0;
  let placed = false;

  function placeNoButton() {
    const w = btnNo.offsetWidth  || 120;
    const h = btnNo.offsetHeight || 52;
    const yesRect = document.getElementById('btnYes').getBoundingClientRect();
    // Ставим под «Да» по центру
    noX = yesRect.left + (yesRect.width - w) / 2;
    noY = yesRect.bottom + 16;
    // Страховка от выхода за экран
    noX = Math.max(16, Math.min(window.innerWidth  - w - 16, noX));
    noY = Math.max(16, Math.min(window.innerHeight - h - 16, noY));
    btnNo.style.left = noX + 'px';
    btnNo.style.top  = noY + 'px';
    placed = true;
  }

  window.addEventListener('load', placeNoButton);
  window.addEventListener('resize', () => { placed = false; placeNoButton(); });

  function teleportAway(mouseX, mouseY) {
    const w   = btnNo.offsetWidth  || 120;
    const h   = btnNo.offsetHeight || 52;
    const pad = 20;
    const areaW = window.innerWidth  - w - pad * 2;
    const areaH = window.innerHeight - h - pad * 2;

    if (areaW <= 0 || areaH <= 0) return; // экран слишком мал

    let bestX = noX, bestY = noY, bestDist = 0;
    for (let i = 0; i < 20; i++) {
      const rx = pad + Math.random() * areaW;
      const ry = pad + Math.random() * areaH;
      const d  = Math.hypot(mouseX - (rx + w / 2), mouseY - (ry + h / 2));
      if (d > bestDist) { bestDist = d; bestX = rx; bestY = ry; }
    }

    noX = bestX; noY = bestY;
    btnNo.style.left = noX + 'px';
    btnNo.style.top  = noY + 'px';
  }

  // Убегает заранее при приближении — не ждёт касания
  document.addEventListener('mousemove', (e) => {
    if (!placed) return;
    const w  = btnNo.offsetWidth  || 120;
    const h  = btnNo.offsetHeight || 52;
    const bx = noX + w / 2;
    const by = noY + h / 2;
    if (Math.hypot(e.clientX - bx, e.clientY - by) < 100) {
      teleportAway(e.clientX, e.clientY);
    }
  });

  // Страховка: если курсор всё же коснулся — мгновенный прыжок
  btnNo.addEventListener('mouseenter', (e) => teleportAway(e.clientX, e.clientY));

  document.addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    const w  = btnNo.offsetWidth  || 120;
    const h  = btnNo.offsetHeight || 52;
    const bx = noX + w / 2;
    const by = noY + h / 2;
    if (Math.hypot(t.clientX - bx, t.clientY - by) < 100) {
      teleportAway(t.clientX, t.clientY);
    }
  }, { passive: true });

  // На мобильном touchstart тоже триггерит побег — до tap не доходит
  document.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    const w  = btnNo.offsetWidth  || 120;
    const h  = btnNo.offsetHeight || 52;
    const bx = noX + w / 2;
    const by = noY + h / 2;
    if (Math.hypot(t.clientX - bx, t.clientY - by) < 60) {
      teleportAway(t.clientX, t.clientY);
    }
  }, { passive: true });

  /* ── Confetti ── */
  const canvas = document.getElementById('confetti');
  const ctx = canvas.getContext('2d');
  let particles = [];
  let animId;

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const COLORS = ['#ff6fa8','#ff3d7f','#ffb3d1','#c084fc','#f9a8d4','#fbbf24','#a78bfa'];

  function spawnParticles() {
    for (let i = 0; i < 160; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: -10,
        r: 5 + Math.random() * 7,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        vx: (Math.random() - 0.5) * 4,
        vy: 2 + Math.random() * 5,
        rot: Math.random() * Math.PI * 2,
        rotV: (Math.random() - 0.5) * 0.2,
        shape: Math.random() > 0.5 ? 'rect' : 'heart',
        alpha: 1,
      });
    }
  }

  function drawHeart(cx, cy, size) {
    ctx.beginPath();
    ctx.moveTo(cx, cy + size * 0.3);
    ctx.bezierCurveTo(cx, cy, cx - size, cy, cx - size, cy + size * 0.4);
    ctx.bezierCurveTo(cx - size, cy + size * 0.9, cx, cy + size * 1.3, cx, cy + size * 1.6);
    ctx.bezierCurveTo(cx, cy + size * 1.3, cx + size, cy + size * 0.9, cx + size, cy + size * 0.4);
    ctx.bezierCurveTo(cx + size, cy, cx, cy, cx, cy + size * 0.3);
    ctx.closePath();
    ctx.fill();
  }

  function animateConfetti() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach((p, i) => {
      p.x  += p.vx;
      p.y  += p.vy;
      p.vy += 0.07;
      p.rot += p.rotV;
      if (p.y > canvas.height + 20) p.alpha -= 0.05;

      ctx.save();
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.fillStyle = p.color;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      if (p.shape === 'rect') {
        ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
      } else {
        drawHeart(0, -p.r * 0.8, p.r * 0.6);
      }
      ctx.restore();
    });
    particles = particles.filter(p => p.alpha > 0);
    if (particles.length > 0) {
      animId = requestAnimationFrame(animateConfetti);
    } else {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  /* ── Celebrate on "Да" ── */
  function celebrate() {
    document.getElementById('mainCard').style.display = 'none';
    btnNo.style.display = 'none';
    document.getElementById('celebration').classList.add('show');
    spawnParticles();
    animateConfetti();
    // extra bursts
    setTimeout(spawnParticles, 800);
    setTimeout(spawnParticles, 1600);
  }
</script>
</body>
</html>
